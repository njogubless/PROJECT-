name: Flutter CI

on:
  push:
    branches:
      - main
      - dev1

  # =====================
  # Flutter CI/CD Workflow
  # =====================

  name: Flutter CI/CD

  on:
    push:
      branches: [main, dev1]
    pull_request:
      branches: [main, dev1]
    workflow_dispatch:

  env:
    FLUTTER_VERSION: "3.32.7"
    JAVA_VERSION: "12.x"
    ANDROID_APK_PATH: "build/app/outputs/flutter-apk/app-release.apk"
    ANDROID_AAB_PATH: "build/app/outputs/bundle/release/app-release.aab"

  jobs:
    analyze-and-test:
      name: Analyze & Test
      runs-on: ubuntu-latest
      timeout-minutes: 30
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up Java
          uses: actions/setup-java@v4
          with:
            distribution: "temurin"
            java-version: ${{ env.JAVA_VERSION }}

        - name: Set up Flutter
          uses: subosito/flutter-action@v2
          with:
            flutter-version: ${{ env.FLUTTER_VERSION }}
            channel: stable
            cache: true

        - name: Install dependencies
          run: flutter pub get

        - name: Check formatting
          run: dart format --output=none --set-exit-if-changed .

        - name: Analyze code
          run: flutter analyze

        - name: Run tests with coverage
          run: flutter test --coverage

        - name: Upload coverage to Codecov
          uses: codecov/codecov-action@v4
          with:
            file: coverage/lcov.info

    build-android:
      name: Build Android
      needs: analyze-and-test
      runs-on: ubuntu-latest
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev1'
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up Java
          uses: actions/setup-java@v4
          with:
            distribution: "temurin"
            java-version: ${{ env.JAVA_VERSION }}

        - name: Set up Flutter
          uses: subosito/flutter-action@v2
          with:
            flutter-version: ${{ env.FLUTTER_VERSION }}
            channel: stable
            cache: true

        - name: Install dependencies
          run: flutter pub get

        - name: Configure keystore (main branch)
          if: github.ref == 'refs/heads/main'
          run: |
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
            echo "storeFile=keystore.jks" > android/key.properties
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/key.properties
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
            echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties

        - name: Build APK/AAB
          run: |
            if [[ ${{ github.ref }} == 'refs/heads/main' ]]; then
              flutter build apk --release
              flutter build appbundle --release
            else
              flutter build apk --debug
            fi

        - name: Upload APK artifact
          uses: actions/upload-artifact@v4
          with:
            name: android-apk
            path: ${{ env.ANDROID_APK_PATH }}
            if-no-files-found: error

        - name: Upload AAB artifact (main only)
          if: github.ref == 'refs/heads/main'
          uses: actions/upload-artifact@v4
          with:
            name: android-aab
            path: ${{ env.ANDROID_AAB_PATH }}
            if-no-files-found: error

        # --- Android Play Store Deployment (commented for now) ---
        # - name: Deploy to Play Store
        #   uses: r0adkll/upload-google-play@v1
        #   with:
        #     serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
        #     packageName: com.example.app
        #     releaseFiles: ${{ env.ANDROID_AAB_PATH }}
        #     track: production

    build-ios:
      name: Build iOS
      needs: analyze-and-test
      runs-on: macos-latest
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev1'
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up Flutter
          uses: subosito/flutter-action@v2
          with:
            flutter-version: ${{ env.FLUTTER_VERSION }}
            channel: stable
            cache: true

        - name: Install dependencies (Flutter & CocoaPods)
          run: |
            flutter pub get
            cd ios && pod install && cd ..

        - name: Build iOS app
          run: |
            if [[ ${{ github.ref }} == 'refs/heads/main' ]]; then
              flutter build ios --release --no-codesign
            else
              flutter build ios --debug --no-codesign
            fi

        - name: Upload iOS build artifact
          uses: actions/upload-artifact@v4
          with:
            name: ios-build
            path: build/ios/
            if-no-files-found: warn

        # --- iOS App Store Deployment (commented for now) ---
        # - name: Deploy to App Store
        #   uses: appleboy/app-store-release-action@v0.3.0
        #   with:
        #     api_key: ${{ secrets.APP_STORE_API_KEY }}
        #     api_issuer: ${{ secrets.APP_STORE_API_ISSUER }}
        #     app_path: build/ios/ipa
        #     bundle_id: com.example.app
